<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCraft — Mind Map Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0f1117;
  --surface: #161b27;
  --card: #1e2433;
  --border: #2a3147;
  --text: #e2e8f8;
  --muted: #6b7a9f;
  --accent: #7c9eff;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Familjen Grotesk', sans-serif;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* TOPBAR */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 100;
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  flex-shrink: 0;
}

.divider { width: 1px; height: 24px; background: var(--border); }

.title-input {
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Familjen Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 600;
  outline: none;
  flex: 1;
  min-width: 0;
}

.toolbar {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

.tb-btn {
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-family: 'Familjen Grotesk', sans-serif;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.tb-btn:hover { background: var(--border); }
.tb-btn.primary { background: var(--accent); color: #0f1117; border-color: var(--accent); }
.tb-btn.primary:hover { opacity: 0.9; }

/* CANVAS */
#canvas {
  position: fixed;
  top: 52px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  cursor: grab;
}
#canvas.grabbing { cursor: grabbing; }
#canvas.connecting { cursor: crosshair; }

#world {
  position: absolute;
  width: 4000px;
  height: 4000px;
  transform-origin: 0 0;
}

/* SVG connections */
#connections {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* NODE */
.node {
  position: absolute;
  border-radius: 12px;
  border: 2px solid;
  background: var(--card);
  cursor: move;
  transition: box-shadow 0.2s;
  min-width: 120px;
  max-width: 220px;
}

.node:hover { box-shadow: 0 0 0 3px rgba(124,158,255,0.25); }
.node.selected { box-shadow: 0 0 0 3px rgba(124,158,255,0.6) !important; }
.node.root { border-radius: 50px; }

.node-inner {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.node-emoji {
  font-size: 16px;
  flex-shrink: 0;
  cursor: pointer;
}

.node-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  border: none;
  background: transparent;
  outline: none;
  font-family: 'Familjen Grotesk', sans-serif;
  width: 100%;
  cursor: text;
  resize: none;
  line-height: 1.4;
}

.node-actions {
  position: absolute;
  top: -36px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  z-index: 50;
  white-space: nowrap;
}

.node:hover .node-actions,
.node.selected .node-actions { display: flex; }

.na-btn {
  width: 26px;
  height: 26px;
  border-radius: 5px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
}
.na-btn:hover { background: var(--border); color: var(--text); }
.na-btn.del:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
.na-btn.conn:hover { background: rgba(124,158,255,0.2); color: var(--accent); }
.na-btn.child:hover { background: rgba(52,211,153,0.2); color: #34d399; }

/* Color dots on node */
.color-bar {
  display: flex;
  gap: 4px;
  padding: 0 14px 10px;
}
.cdot {
  width: 14px; height: 14px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.1s;
  flex-shrink: 0;
}
.cdot:hover { transform: scale(1.2); }
.cdot.active { border-color: #fff; }

/* CONTEXT HINT */
.hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  pointer-events: none;
  z-index: 200;
  transition: opacity 0.3s;
}

/* MINIMAP */
#minimap {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 160px;
  height: 100px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  z-index: 100;
}

/* EMOJI PICKER */
.epicker {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
  display: grid;
  grid-template-columns: repeat(6,1fr);
  gap: 3px;
  z-index: 300;
  box-shadow: var(--shadow);
}
.epicker button {
  width: 30px; height: 30px;
  border: none; background: none;
  cursor: pointer; border-radius: 4px;
  font-size: 15px;
  transition: background 0.1s;
}
.epicker button:hover { background: var(--border); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px; left: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  z-index: 999;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* Grid bg */
#canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle, rgba(124,158,255,0.08) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">MINDCRAFT</div>
  <div class="divider"></div>
  <input class="title-input" id="map-title" value="Mind Map Baru" placeholder="Tajuk mind map..." />
  <div class="toolbar">
    <button class="tb-btn" onclick="addNode()">＋ Node</button>
    <button class="tb-btn" onclick="autoLayout()">⟳ Layout</button>
    <button class="tb-btn" onclick="fitView()">⊞ Fit</button>
    <button class="tb-btn" onclick="exportJSON()">⬇ Export</button>
    <button class="tb-btn" onclick="importJSON()">⬆ Import</button>
    <button class="tb-btn primary" onclick="saveLocal()">💾 Simpan</button>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas">
  <div id="world">
    <svg id="connections"></svg>
  </div>
</div>

<div class="hint" id="hint">Double-klik canvas untuk node baru • Drag node untuk pindah • Klik 🔗 untuk sambung node</div>
<div class="toast" id="toast"></div>

<script>
const COLORS = [
  '#7c9eff','#34d399','#f59e0b','#f472b6','#a78bfa',
  '#fb923c','#38bdf8','#4ade80','#e879f9','#fb7185'
];

const EMOJIS = ['💡','🎯','🔥','⚡','🌟','📌','🔑','🚀','💎','🧠',
                '📊','🛠️','✅','❓','💬','🔗','📱','🌐','⚙️','🏆',
                '📝','🔍','💼','🎨','🌱','⚠️','🔒','📡','🎭','🌊'];

let nodes = [];
let edges = [];
let nextId = 1;
let scale = 1;
let panX = 0, panY = 0;
let isDragging = false;
let dragNode = null, dragOffX = 0, dragOffY = 0;
let isPanning = false, panStartX = 0, panStartY = 0;
let connectFrom = null;
let selectedNode = null;

const canvas = document.getElementById('canvas');
const world = document.getElementById('world');
const svg = document.getElementById('connections');

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  loadLocal();
  if (nodes.length === 0) {
    // Default mind map
    const root = createNode(1800, 1900, '🧠', 'Idea Utama', '#7c9eff', true);
    const n1 = createNode(1500, 1700, '💡', 'Topik 1', '#34d399');
    const n2 = createNode(2100, 1700, '🎯', 'Topik 2', '#f59e0b');
    const n3 = createNode(1500, 2100, '🔥', 'Topik 3', '#f472b6');
    const n4 = createNode(2100, 2100, '⚡', 'Topik 4', '#a78bfa');
    edges.push({from: root.id, to: n1.id});
    edges.push({from: root.id, to: n2.id});
    edges.push({from: root.id, to: n3.id});
    edges.push({from: root.id, to: n4.id});
  }
  renderAll();
  fitView();
}

// ─── NODE ─────────────────────────────────────────────────────────────────────
function createNode(x, y, emoji='💡', text='Node baru', color='#7c9eff', isRoot=false) {
  const node = { id: nextId++, x, y, emoji, text, color, isRoot };
  nodes.push(node);
  return node;
}

function renderAll() {
  // Remove old nodes (keep svg)
  Array.from(world.children).forEach(c => { if (c !== svg) c.remove(); });
  svg.innerHTML = '';

  // Draw edges
  edges.forEach(e => drawEdge(e));

  // Draw nodes
  nodes.forEach(n => drawNode(n));

  updateTransform();
}

function drawNode(n) {
  const el = document.createElement('div');
  el.className = 'node' + (n.isRoot ? ' root' : '') + (selectedNode === n.id ? ' selected' : '');
  el.id = `node-${n.id}`;
  el.style.left = n.x + 'px';
  el.style.top = n.y + 'px';
  el.style.borderColor = n.color;
  el.style.boxShadow = `0 4px 20px ${n.color}30`;

  // Actions
  const actions = document.createElement('div');
  actions.className = 'node-actions';
  actions.innerHTML = `
    <button class="na-btn child" title="Tambah anak" onclick="addChild(${n.id})">+</button>
    <button class="na-btn conn" title="Sambung ke node lain" onclick="startConnect(${n.id})">🔗</button>
    <button class="na-btn" title="Tukar emoji" onclick="openEmoji(event,${n.id})">😀</button>
    <button class="na-btn del" title="Padam" onclick="deleteNode(${n.id})">✕</button>
  `;

  // Inner
  const inner = document.createElement('div');
  inner.className = 'node-inner';

  const emoji = document.createElement('span');
  emoji.className = 'node-emoji';
  emoji.textContent = n.emoji;

  const textarea = document.createElement('textarea');
  textarea.className = 'node-text';
  textarea.value = n.text;
  textarea.rows = 1;
  textarea.style.width = '100%';
  textarea.oninput = () => {
    n.text = textarea.value;
    autoResizeTA(textarea);
    renderEdges();
  };
  textarea.onfocus = () => { isDragging = false; };
  autoResizeTA(textarea);

  inner.appendChild(emoji);
  inner.appendChild(textarea);

  // Color bar
  const colorBar = document.createElement('div');
  colorBar.className = 'color-bar';
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'cdot' + (n.color === c ? ' active' : '');
    dot.style.background = c;
    dot.onclick = (e) => { e.stopPropagation(); n.color = c; renderAll(); };
    colorBar.appendChild(dot);
  });

  el.appendChild(actions);
  el.appendChild(inner);
  el.appendChild(colorBar);
  world.appendChild(el);

  // Drag
  el.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON' || e.target.classList.contains('cdot')) return;
    e.stopPropagation();

    if (connectFrom !== null) {
      if (connectFrom !== n.id) {
        const exists = edges.find(ed => (ed.from===connectFrom&&ed.to===n.id)||(ed.from===n.id&&ed.to===connectFrom));
        if (!exists) edges.push({from: connectFrom, to: n.id});
        else showToast('⚠ Sambungan dah wujud!');
      }
      connectFrom = null;
      canvas.classList.remove('connecting');
      renderAll();
      return;
    }

    selectedNode = n.id;
    dragNode = n;
    const rect = el.getBoundingClientRect();
    dragOffX = (e.clientX - rect.left) / scale;
    dragOffY = (e.clientY - rect.top) / scale;
    isDragging = true;
    el.style.zIndex = 50;
    renderAll();
  });

  // Position after append to get size
  requestAnimationFrame(() => {
    renderEdges();
  });
}

function drawEdge(e) {
  const from = nodes.find(n => n.id === e.from);
  const to = nodes.find(n => n.id === e.to);
  if (!from || !to) return;

  const fromEl = document.getElementById(`node-${from.id}`);
  const toEl = document.getElementById(`node-${to.id}`);
  const fw = fromEl ? fromEl.offsetWidth : 140;
  const fh = fromEl ? fromEl.offsetHeight : 60;
  const tw = toEl ? toEl.offsetWidth : 140;
  const th = toEl ? toEl.offsetHeight : 60;

  const x1 = from.x + fw/2;
  const y1 = from.y + fh/2;
  const x2 = to.x + tw/2;
  const y2 = to.y + th/2;

  const dx = x2 - x1, dy = y2 - y1;
  const cx = x1 + dx * 0.5, cy = y1 + dy * 0.5;

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', `M ${x1} ${y1} Q ${cx} ${y1} ${x2} ${y2}`);
  path.setAttribute('stroke', from.color);
  path.setAttribute('stroke-width', '2');
  path.setAttribute('fill', 'none');
  path.setAttribute('opacity', '0.6');
  path.setAttribute('stroke-dasharray', '0');

  // Delete edge on click
  path.style.cursor = 'pointer';
  path.style.pointerEvents = 'stroke';
  path.setAttribute('stroke-width', '6');
  path.setAttribute('opacity', '0');
  const visPath = path.cloneNode();
  visPath.setAttribute('stroke-width','2');
  visPath.setAttribute('opacity','0.6');
  visPath.style.pointerEvents = 'none';

  path.onclick = () => {
    edges = edges.filter(ed => !(ed.from===e.from && ed.to===e.to));
    renderAll();
    showToast('🗑 Sambungan dipadam');
  };

  svg.appendChild(visPath);
  svg.appendChild(path);
}

function renderEdges() {
  svg.innerHTML = '';
  edges.forEach(e => drawEdge(e));
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function addNode(x, y) {
  const cx = (canvas.offsetWidth/2 - panX) / scale;
  const cy = (canvas.offsetHeight/2 - panY) / scale;
  const node = createNode(
    x !== undefined ? x : cx - 70 + (Math.random()-0.5)*200,
    y !== undefined ? y : cy - 30 + (Math.random()-0.5)*200,
    EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
    'Node baru',
    COLORS[Math.floor(Math.random()*COLORS.length)]
  );
  renderAll();
  showToast('✅ Node ditambah!');
  return node;
}

function addChild(parentId) {
  const parent = nodes.find(n => n.id === parentId);
  if (!parent) return;
  const child = createNode(
    parent.x + 220 + (Math.random()-0.5)*80,
    parent.y + (Math.random()-0.5)*120,
    EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
    'Anak node',
    parent.color
  );
  edges.push({from: parentId, to: child.id});
  renderAll();
  showToast('✅ Anak node ditambah!');
}

function deleteNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  if (selectedNode === id) selectedNode = null;
  renderAll();
  showToast('🗑 Node dipadam');
}

function startConnect(id) {
  connectFrom = id;
  canvas.classList.add('connecting');
  showToast('🔗 Klik node lain untuk sambung...');
}

function openEmoji(e, nodeId) {
  e.stopPropagation();
  document.querySelectorAll('.epicker').forEach(p => p.remove());

  const picker = document.createElement('div');
  picker.className = 'epicker';
  picker.onclick = ev => ev.stopPropagation();

  EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.textContent = em;
    btn.onclick = () => {
      const node = nodes.find(n => n.id === nodeId);
      if (node) node.emoji = em;
      picker.remove();
      renderAll();
    };
    picker.appendChild(btn);
  });

  const nodeEl = document.getElementById(`node-${nodeId}`);
  nodeEl.appendChild(picker);
  picker.style.top = '-10px';
  picker.style.left = (nodeEl.offsetWidth + 8) + 'px';
}

// ─── LAYOUT ───────────────────────────────────────────────────────────────────
function autoLayout() {
  if (nodes.length === 0) return;

  // Find root node
  const connectedTo = new Set(edges.map(e => e.to));
  let root = nodes.find(n => !connectedTo.has(n.id) || n.isRoot) || nodes[0];

  // BFS
  const visited = new Set();
  const queue = [{node: root, depth: 0, siblingIdx: 0, siblingCount: 1}];
  const centerX = 1900, centerY = 1900;
  const levelSpacingX = 280, levelSpacingY = 130;

  const levelCounts = {};
  const nodeDepth = {};
  nodeDepth[root.id] = 0;

  // Count per level
  const bfsQueue2 = [root.id];
  const vis2 = new Set([root.id]);
  while(bfsQueue2.length > 0) {
    const id = bfsQueue2.shift();
    const d = nodeDepth[id];
    levelCounts[d] = (levelCounts[d]||0) + 1;
    edges.filter(e => e.from === id || e.to === id).forEach(e => {
      const other = e.from === id ? e.to : e.from;
      if (!vis2.has(other)) {
        vis2.add(other);
        nodeDepth[other] = d + 1;
        bfsQueue2.push(other);
      }
    });
  }

  // Position
  const levelIdx = {};
  Object.keys(nodeDepth).forEach(id => {
    const d = nodeDepth[id];
    if (levelIdx[d] === undefined) levelIdx[d] = 0;
    const count = levelCounts[d];
    const node = nodes.find(n => n.id == id);
    if (node) {
      node.x = centerX + d * levelSpacingX;
      node.y = centerY + (levelIdx[d] - (count-1)/2) * levelSpacingY;
    }
    levelIdx[d]++;
  });

  renderAll();
  fitView();
  showToast('⟳ Layout disusun!');
}

function fitView() {
  if (nodes.length === 0) return;
  const minX = Math.min(...nodes.map(n => n.x)) - 60;
  const minY = Math.min(...nodes.map(n => n.y)) - 60;
  const maxX = Math.max(...nodes.map(n => n.x)) + 220;
  const maxY = Math.max(...nodes.map(n => n.y)) + 120;
  const w = maxX - minX, h = maxY - minY;
  const cw = canvas.offsetWidth, ch = canvas.offsetHeight - 52;
  scale = Math.min(cw/w, ch/h, 1.2) * 0.85;
  panX = (cw - w*scale)/2 - minX*scale;
  panY = (ch - h*scale)/2 - minY*scale;
  updateTransform();
}

// ─── TRANSFORM ────────────────────────────────────────────────────────────────
function updateTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
  if (e.target === canvas || e.target === world || e.target === svg) {
    if (connectFrom !== null) {
      connectFrom = null;
      canvas.classList.remove('connecting');
      return;
    }
    selectedNode = null;
    isPanning = true;
    panStartX = e.clientX - panX;
    panStartY = e.clientY - panY;
    canvas.classList.add('grabbing');
    renderAll();
  }
});

canvas.addEventListener('dblclick', (e) => {
  if (e.target === canvas || e.target === world || e.target === svg || e.target.id === 'canvas') {
    const x = (e.clientX - panX) / scale - 70;
    const y = (e.clientY - panY - 52) / scale - 30;
    addNode(x, y);
  }
});

window.addEventListener('mousemove', (e) => {
  if (isPanning) {
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    updateTransform();
  }
  if (isDragging && dragNode) {
    dragNode.x = (e.clientX - panX) / scale - dragOffX;
    dragNode.y = (e.clientY - panY) / scale - dragOffY;
    const el = document.getElementById(`node-${dragNode.id}`);
    if (el) {
      el.style.left = dragNode.x + 'px';
      el.style.top = dragNode.y + 'px';
    }
    renderEdges();
  }
});

window.addEventListener('mouseup', () => {
  isPanning = false;
  isDragging = false;
  dragNode = null;
  canvas.classList.remove('grabbing');
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const mouseX = e.clientX, mouseY = e.clientY;
  const wx = (mouseX - panX) / scale;
  const wy = (mouseY - panY) / scale;
  scale = Math.min(Math.max(scale * delta, 0.2), 3);
  panX = mouseX - wx * scale;
  panY = mouseY - wy * scale;
  updateTransform();
}, { passive: false });

document.addEventListener('click', () => {
  document.querySelectorAll('.epicker').forEach(p => p.remove());
});

// ─── SAVE / LOAD ──────────────────────────────────────────────────────────────
function saveLocal() {
  const data = {
    title: document.getElementById('map-title').value,
    nodes, edges, nextId
  };
  localStorage.setItem('mindcraft_data', JSON.stringify(data));
  showToast('💾 Disimpan!');
}

function loadLocal() {
  try {
    const saved = localStorage.getItem('mindcraft_data');
    if (!saved) return;
    const data = JSON.parse(saved);
    if (data.title) document.getElementById('map-title').value = data.title;
    if (data.nodes) nodes = data.nodes;
    if (data.edges) edges = data.edges;
    if (data.nextId) nextId = data.nextId;
    showToast('📂 Data lama dimuatkan!');
  } catch {}
}

function exportJSON() {
  const data = {
    title: document.getElementById('map-title').value,
    nodes, edges, nextId
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mindmap.json';
  a.click();
  showToast('⬇ JSON dieksport!');
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.title) document.getElementById('map-title').value = data.title;
        if (data.nodes) nodes = data.nodes;
        if (data.edges) edges = data.edges;
        if (data.nextId) nextId = data.nextId;
        renderAll();
        fitView();
        showToast('⬆ Mind map diimport!');
      } catch { showToast('⚠ Fail tidak sah!'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function autoResizeTA(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 80) + 'px';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
